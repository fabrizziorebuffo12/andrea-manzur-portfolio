<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería — Andrea Manzur</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../css/styles.css">

<body>

  <main class="galeria-wrapper">

    <section class="galeria-descripcion">

      <p class="galeria-texto" id="galeriaTexto"></p><span class="galeria-cursor" id="galeriaCursor">|</span>

    <section class="galeria-renders">
      <div class="galeria-stage" id="galeriaStage">
        <!-- Los items se generan por JS -->
      </div>
    </section>

    <div class="galeria-am-wrapper">
      <a href="#" id="amBackLink" class="am-initials-link">A.M</a>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/galeria.js"></script>

</html>
